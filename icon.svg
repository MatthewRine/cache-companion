<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a5f1a"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="#2d8a2d" stroke-width="2"/>

  <!-- Compass rose - N/S diamond (dark, pointing up/down) -->
  <polygon points="64,18 70,58 64,52 58,58" fill="#ffffff"/>
  <polygon points="64,110 70,70 64,76 58,70" fill="#a8d5a8"/>

  <!-- Compass rose - E/W diamond (smaller) -->
  <polygon points="110,64 70,58 76,64 70,70" fill="#a8d5a8"/>
  <polygon points="18,64 58,58 52,64 58,70" fill="#a8d5a8"/>

  <!-- Center dot -->
  <circle cx="64" cy="64" r="5" fill="#ffffff"/>

  <!-- Tick marks at cardinal points -->
  <line x1="64" y1="10" x2="64" y2="16" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="112" x2="64" y2="118" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="64" x2="16" y2="64" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="64" x2="118" y2="64" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
</svg>
