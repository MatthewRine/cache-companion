<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cache Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 260px;
      padding: 1rem;
      color: #222;
    }
    h1 { font-size: 1rem; color: #1a5f1a; margin-bottom: 0.5rem; }
    #status { font-size: 0.82rem; color: #333; margin-bottom: 0.75rem; line-height: 1.5; }
    button {
      display: block;
      width: 100%;
      background: #1a5f1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #145014; }
  </style>
</head>
<body>
  <h1>🧭 Cache Companion</h1>
  <div id="status">Loading…</div>
  <button id="options-btn">Import GPX / View Stats</button>
  <script src="popup.js"></script>
</body>
</html>
