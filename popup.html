<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cache Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 260px;
      padding: 1rem;
      color: #222;
    }
    h1 { font-size: 1rem; color: #1a5f1a; margin-bottom: 0.75rem; }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
    }
    .stat-label {
      font-size: 0.78rem;
      color: #888;
      width: 52px;
      flex-shrink: 0;
    }
    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a5f1a;
    }
    .stat-pct {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a5f1a;
      margin-left: auto;
    }
    .updated {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 0.5rem;
      margin-bottom: 0.75rem;
    }
    #status { margin-bottom: 0.75rem; font-size: 0.82rem; color: #555; line-height: 1.6; }
    button {
      display: block;
      width: 100%;
      background: #1a5f1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #145014; }
  </style>
</head>
<body>
  <h1>🧭 Cache Companion</h1>
  <div id="status">Loading…</div>
  <button id="options-btn">Import GPX / View Stats</button>
  <script src="popup.js"></script>
</body>
</html>
