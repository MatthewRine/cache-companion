<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cache Companion</title>
  <style>
    :root {
      --bg:         #ffffff;
      --text:       #222222;
      --text-muted: #555555;
      --text-dim:   #888888;
      --text-dimmer:#aaaaaa;
      --green:      #1a5f1a;
      --green-dark: #145014;
      --btn-bg:     #1a5f1a;
      --btn-hover:  #145014;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #1e1e1e;
        --text:       #e8e8e8;
        --text-muted: #aaaaaa;
        --text-dim:   #777777;
        --text-dimmer:#555555;
        --green:      #4caf50;
        --green-dark: #388e3c;
        --btn-bg:     #1a5f1a;
        --btn-hover:  #145014;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 260px;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
    }
    h1 { font-size: 1rem; color: var(--green); margin-bottom: 0.75rem; }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.3rem;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      width: 52px;
      flex-shrink: 0;
    }
    .stat-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--green);
    }
    .stat-pct {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--green);
      margin-left: auto;
    }
    .updated {
      font-size: 0.72rem;
      color: var(--text-dimmer);
      margin-top: 0.5rem;
      margin-bottom: 0.75rem;
    }
    #status { margin-bottom: 0.75rem; font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; }
    button {
      display: block;
      width: 100%;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <h1>🧭 Cache Companion</h1>
  <div id="status">Loading…</div>
  <button id="options-btn">Import GPX / View Stats</button>
  <script src="popup.js"></script>
</body>
</html>
